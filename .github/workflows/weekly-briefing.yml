name: Daily Briefing

on:
  # KST daily 9:00 AM = UTC daily 00:00
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      day:
        description: 'Run date in YYYY-MM-DD (defaults to current KST date)'
        required: false
        type: string
      max_cost_usd:
        description: 'Cost ceiling in USD'
        required: false
        type: string
        default: '15'
      max_tools:
        description: 'Maximum ResearcherAgent runs / feed items to attempt'
        required: false
        type: string
        default: '20'
      search_backend:
        description: 'Search backend: serper, perplexity, or openai'
        required: false
        type: choice
        default: serper
        options:
          - serper
          - perplexity
          - openai
      since:
        description: 'Search recency window'
        required: false
        type: choice
        default: year
        options:
          - day
          - week
          - month
          - year
          - all

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: daily-briefing
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync

      - name: Resolve day id
        id: day
        run: |
          if [ -n "${{ inputs.day }}" ]; then
            echo "day=${{ inputs.day }}" >> "$GITHUB_OUTPUT"
          else
            echo "day=$(TZ=Asia/Seoul date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare result branch
        run: |
          BRANCH="daily/${{ steps.day.outputs.day }}"
          git fetch origin "$BRANCH" || true
          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            git switch -C "$BRANCH" "origin/$BRANCH"
          else
            git switch -c "$BRANCH"
          fi

      - name: Run daily briefing
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run autoresearch-researcher run \
            --day "${{ steps.day.outputs.day }}" \
            --output-dir daily_runs \
            --max-tools "${{ inputs.max_tools || '20' }}" \
            --max-cost-usd "${{ inputs.max_cost_usd || '15' }}" \
            --search-backend "${{ inputs.search_backend || 'serper' }}" \
            --since "${{ inputs.since || 'year' }}" \
            --rerun

      - name: Commit and open PR
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "autoresearch-bot"
          git config user.email "autoresearch-bot@users.noreply.github.com"
          BRANCH="daily/${{ steps.day.outputs.day }}"

          git add -f daily_runs/
          if git diff --cached --quiet; then
            echo "No new files to commit."
          else
            git commit -m "daily: ${{ steps.day.outputs.day }} briefing"
            git push -u origin "$BRANCH"
          fi

          if gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            echo "PR already exists for $BRANCH."
          else
            PR_BODY=$'Automated daily ResearcherAgent feed output for ${{ steps.day.outputs.day }}.\n\nThis run writes:\n- `daily_runs/${{ steps.day.outputs.day }}/items/*.json`\n- `daily_runs/${{ steps.day.outputs.day }}/manifest.json`\n- `daily_runs/${{ steps.day.outputs.day }}/_profile_runs.jsonl`\n- `daily_runs/_registry/`\n\nThe ResearcherAgent uses `researcher.md`'\\''s Query Example Pool to write search queries directly; review individual `research_run_*` / `research_<tool>` Weave traces for annotation.'
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "daily: ${{ steps.day.outputs.day }} briefing" \
              --body "$PR_BODY"
          fi
