name: Daily Briefing

on:
  # KST daily 9:00 AM = UTC daily 00:00
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      day:
        description: 'Run date in YYYY-MM-DD (defaults to current KST date)'
        required: false
        type: string
      max_cost_usd:
        description: 'Cost ceiling in USD'
        required: false
        type: string
        default: '15'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: daily-briefing
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync

      - name: Resolve day id
        id: day
        run: |
          if [ -n "${{ inputs.day }}" ]; then
            echo "day=${{ inputs.day }}" >> "$GITHUB_OUTPUT"
          else
            echo "day=$(TZ=Asia/Seoul date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare result branch
        run: |
          BRANCH="daily/${{ steps.day.outputs.day }}"
          git fetch origin "$BRANCH" || true
          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            git switch -C "$BRANCH" "origin/$BRANCH"
          else
            git switch -c "$BRANCH"
          fi

      - name: Run daily briefing
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run autoresearch-researcher run \
            --day "${{ steps.day.outputs.day }}" \
            --output-dir daily_runs \
            --max-cost-usd "${{ inputs.max_cost_usd || '15' }}" \
            --rerun

      - name: Commit and open PR
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "autoresearch-bot"
          git config user.email "autoresearch-bot@users.noreply.github.com"
          BRANCH="daily/${{ steps.day.outputs.day }}"

          git add -f daily_runs/
          if git diff --cached --quiet; then
            echo "No new files to commit."
          else
            git commit -m "daily: ${{ steps.day.outputs.day }} briefing"
            git push -u origin "$BRANCH"
          fi

          if gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            echo "PR already exists for $BRANCH."
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "daily: ${{ steps.day.outputs.day }} briefing" \
              --body "Automated daily briefing output for ${{ steps.day.outputs.day }}."
          fi
